<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal PM Voting</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    background: url("bg.jpg") no-repeat center center/cover;
    background-size: cover;
}

.container {
    background: rgba(255,255,255,0.95);
    width: 500px;
    margin: 50px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.candidate {
    margin: 25px 0;
}

.candidate img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 5px;
}

button {
    padding: 8px 18px;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 5px;
    background-color: #d31027;
}

button:hover {
    background-color: #a10c1f;
}

button:disabled {
    background-color: grey;
    cursor: not-allowed;
}

.vote-box {
    width: 100%;
    height: 30px;
    border-radius: 5px;
    margin-top: 5px;
    position: relative;
    overflow: hidden;
    display: none;
}

.vote-fill {
    height: 100%;
    width: 0%;
    text-align: center;
    color: white;
    font-weight: bold;
    line-height: 30px;
    transition: width 0.7s;
}

#totalVotes {
    margin-top: 20px;
    font-weight: bold;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Vote for Next PM of Nepal</h1>

    <div class="candidate">
        <img src="balen.jpg" alt="Balen Shah">
        <br>
        <button onclick="vote('balen')">Vote Balen Shah</button>
        <div class="vote-box">
            <div id="balenBar" class="vote-fill" style="background-color:blue;">0 (0%)</div>
        </div>
    </div>

    <div class="candidate">
        <img src="harka.jpg" alt="Harka Sampang">
        <br>
        <button onclick="vote('harka')">Vote Harka Sampang</button>
        <div class="vote-box">
            <div id="harkaBar" class="vote-fill" style="background-color:black;">0 (0%)</div>
        </div>
    </div>

    <div class="candidate">
        <img src="oli.jpg" alt="KP Oli">
        <br>
        <button onclick="vote('oli')">Vote KP Oli</button>
        <div class="vote-box">
            <div id="oliBar" class="vote-fill" style="background-color:red;">0 (0%)</div>
        </div>
    </div>

    <div class="candidate">
        <img src="gagan.jpg" alt="Gagan Thapa">
        <br>
        <button onclick="vote('gagan')">Vote Gagan Thapa</button>
        <div class="vote-box">
            <div id="gaganBar" class="vote-fill" style="background-color:green;">0 (0%)</div>
        </div>
    </div>

    <div id="totalVotes">Total Votes: 0</div>
</div>

<audio id="balenSong" src="balen.mp3"></audio>
<audio id="harkaSong" src="harka.mp3"></audio>
<audio id="oliSong" src="oli.mp3"></audio>
<audio id="gaganSong" src="gagan.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJAs6fWzzH9V-GiTsC0JKczn6qDU4vaeY",
  authDomain: "nepal-pm-voting.firebaseapp.com",
  databaseURL: "https://nepal-pm-voting-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nepal-pm-voting",
  storageBucket: "nepal-pm-voting.firebasestorage.app",
  messagingSenderId: "688396191682",
  appId: "1:688396191682:web:8e140e2ff87cacb526785b",
  measurementId: "G-59GKJ2NS6C"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const votesRef = ref(db, "votes");

// Initialize votes if not exist
onValue(votesRef, (snapshot) => {
    if (!snapshot.exists()) {
        set(votesRef, {balen:0, harka:0, oli:0, gagan:0});
    }
    updateBars(snapshot.val() || {balen:0, harka:0, oli:0, gagan:0});
});

function showBars() {
    const boxes = document.querySelectorAll('.vote-box');
    boxes.forEach(box => box.style.display = 'block');
}

function disableButtons() {
    const buttons = document.querySelectorAll("button");
    buttons.forEach(button => button.disabled = true);
}

function updateBars(votes) {
    const total = (votes.balen||0) + (votes.harka||0) + (votes.oli||0) + (votes.gagan||0);

    function updateBar(id, count) {
        const perc = total ? Math.round(count/total*100) : 0;
        const bar = document.getElementById(id);
        bar.style.width = perc + "%";
        bar.innerText = count + " (" + perc + "%)";
    }

    updateBar("balenBar", votes.balen || 0);
    updateBar("harkaBar", votes.harka || 0);
    updateBar("oliBar", votes.oli || 0);
    updateBar("gaganBar", votes.gagan || 0);

    document.getElementById("totalVotes").innerText = "Total Votes: " + total;

    if(total >= 0){
        showBars();
    }
}

window.vote = function(candidate) {
    if(localStorage.getItem("voted")){
        alert("You have already voted!");
        return;
    }

    runTransaction(ref(db, 'votes/' + candidate), (current) => {
        return (current || 0) + 1;
    });

    localStorage.setItem("voted","true");
    alert("Thank you for voting!");
    document.getElementById(candidate+"Song").play();

    disableButtons();
}

// Disable buttons if already voted
if(localStorage.getItem("voted")){
    disableButtons();
}
</script>

</body>
</html>
