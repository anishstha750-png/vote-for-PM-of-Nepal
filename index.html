<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal PM Voting</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, rgb(130, 237, 176), rgb(99, 186, 171));
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

.container {
    background: rgba(137, 179, 199, 0.95);
    width: 100%;
    max-width: 500px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 12px 30px rgba(159, 129, 129, 0.25);
    text-align: center;
    position: relative;
}

/* Header */
.header-container {
    margin-bottom: 25px;
}
.header-container h1 {
    font-size: 24px;
    color: #151515;
    margin-bottom: 10px;
}
.header-container #totalVotes {
    font-weight: bold;
    font-size: 16px;
    color: #111;
}

/* Candidate section */
.candidate {
    margin:18px 0;
    padding:15px;
    border-radius:15px;
    background: linear-gradient(145deg, #f7f7f7, #e2e2e2);
    box-shadow: 5px 5px 15px rgba(0,0,0,0.15);
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
}
.candidate:hover { transform:translateY(-5px); box-shadow:5px 10px 25px rgba(0,0,0,0.25); }

.candidate img {
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
    border:3px solid #6b7280;
    transition: transform 0.3s ease;
}
.candidate img:hover { transform:scale(1.05); }

button {
    padding:14px;
    font-size:16px;
    width:100%;
    border:none;
    background: linear-gradient(135deg, grey, grey);
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition: transform 0.2s, background 0.3s;
    font-weight:600;
}
button:hover { background: linear-gradient(135deg, grey, grey); }
button:active { transform: scale(0.97); }
button:disabled { background-color: grey; cursor: not-allowed; }

/* Vote bars */
.vote-box {
    width:100%;
    height:30px;
    border-radius:10px;
    margin-top:10px;
    overflow:hidden;
    display:none;
    background: white;
}

.vote-fill {
    height:100%;
    width:0%;
    text-align:center;
    color:white;
    font-weight:bold;
    line-height:30px;
    transition: width 1s ease-in-out;
    border-radius:10px;
    white-space: nowrap;
    overflow: hidden;
}

/* Message */
#message {
    margin-top:15px;
    font-weight:bold;
    font-size:16px;
    color:#111;
}

/* Mobile adjustments */
@media (max-width:480px){
    .container{padding:20px;border-radius:15px;}
    h1{font-size:20px;}
    button{font-size:14px; padding:12px;}
    .candidate img{width:100px;height:100px;}
    #totalVotes{font-size:14px;}
    .vote-box{height:35px;}
    .vote-fill{line-height:35px; font-size:14px;}
}
</style>
</head>

<body>

<div class="container">
    <div class="header-container">
        <h1>Vote for Next PM of Nepal</h1>
        <div id="totalVotes">Total Votes: 0</div>
    </div>

    <div class="candidate">
        <img src="balen.jpg" alt="Balen Shah">
        <br>
        <button onclick="vote('balen')">Vote Balen Shah</button>
        <div class="vote-box"><div id="balenBar" class="vote-fill"></div></div>
    </div>

    <div class="candidate">
        <img src="harka.jpg" alt="Harka Sampang">
        <br>
        <button onclick="vote('harka')">Vote Harka Sampang</button>
        <div class="vote-box"><div id="harkaBar" class="vote-fill"></div></div>
    </div>

    <div class="candidate">
        <img src="oli.jpg" alt="KP Oli">
        <br>
        <button onclick="vote('oli')">Vote KP Oli</button>
        <div class="vote-box"><div id="oliBar" class="vote-fill"></div></div>
    </div>

    <div class="candidate">
        <img src="gagan.jpg" alt="Gagan Thapa">
        <br>
        <button onclick="vote('gagan')">Vote Gagan Thapa</button>
        <div class="vote-box"><div id="gaganBar" class="vote-fill"></div></div>
    </div>

    <div id="message"></div>
</div>

<audio id="balenSong" src="balen.mp3"></audio>
<audio id="harkaSong" src="harka.mp3"></audio>
<audio id="oliSong" src="oli.mp3"></audio>
<audio id="gaganSong" src="gagan.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJAs6fWzzH9V-GiTsC0JKczn6qDU4vaeY",
  authDomain: "nepal-pm-voting.firebaseapp.com",
  databaseURL: "https://nepal-pm-voting-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nepal-pm-voting",
  storageBucket: "nepal-pm-voting.firebasestorage.app",
  messagingSenderId: "688396191682",
  appId: "1:688396191682:web:8e140e2ff87cacb526785b",
  measurementId: "G-59GKJ2NS6C"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const votesRef = ref(db, "votes");

// Show vote bars
function showBars(){ document.querySelectorAll(".vote-box").forEach(b => b.style.display = "block"); }
function disableButtons(){ document.querySelectorAll("button").forEach(b => b.disabled = true); }

// Update vote bars
function updateBars(votes){
    const total = (votes.balen||0)+(votes.harka||0)+(votes.oli||0)+(votes.gagan||0);
    function barUpdate(id, count, color){
        const perc = total ? Math.round(count / total * 100) : 0;
        const bar = document.getElementById(id);
        bar.style.width = perc + "%";
        bar.style.background = color;
        bar.innerText = perc>5 ? `${count} (${perc}%)` : "";
    }
    barUpdate("balenBar", votes.balen || 0, "linear-gradient(to right,#3b82f6,#60a5fa)");
    barUpdate("harkaBar", votes.harka || 0, "linear-gradient(to right,#000000,#434343)");
    barUpdate("oliBar", votes.oli || 0, "linear-gradient(to right,#ef4444,#f87171)");
    barUpdate("gaganBar", votes.gagan || 0, "linear-gradient(to right,#22c55e,#4ade80)");

    document.getElementById("totalVotes").innerText = "Total Votes: " + total;
    showBars();
}

// Load initial votes
onValue(votesRef, snapshot => {
    if(!snapshot.exists()){ set(votesRef, {balen:0, harka:0, oli:0, gagan:0}); }
    updateBars(snapshot.val() || {balen:0, harka:0, oli:0, gagan:0});
});

// -------------------- VOTE LOGGING FUNCTIONS --------------------
function sendVoteLog(log) {
    const logsRef = ref(db, "voteLogs"); // voteLogs node
    push(logsRef, log)
        .then(() => console.log("Vote logged:", log))
        .catch(err => console.error("Error logging vote:", err));
}

function logVote(candidate) {
    const voteLog = {
        candidate: candidate,
        time: new Date().toISOString(),
        userAgent: navigator.userAgent,
        location: null
    };

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            position => {
                voteLog.location = {
                    lat: position.coords.latitude,
                    lon: position.coords.longitude
                };
                sendVoteLog(voteLog);
            },
            error => {
                console.warn("Geolocation not available:", error.message);
                sendVoteLog(voteLog);
            },
            { enableHighAccuracy: true, timeout: 5000 }
        );
    } else {
        sendVoteLog(voteLog);
    }
}

// -------------------- VOTING FUNCTION --------------------
window.vote = function(candidate){
    if(localStorage.getItem("voted")){
        document.getElementById("message").innerText = "You have already voted!";
        return;
    }

    runTransaction(ref(db, 'votes/' + candidate), current => (current || 0) + 1)
        .then(() => {
            localStorage.setItem("voted","true");
            document.getElementById("message").innerText = "Thank you for voting!";
            document.getElementById(candidate + "Song").play();

            // Update bars immediately
            onValue(votesRef, snapshot => {
                updateBars(snapshot.val() || {balen:0, harka:0, oli:0, gagan:0});
            }, { onlyOnce: true });

            // LOG THE VOTE
            logVote(candidate);
        });

    disableButtons();
}

// Disable buttons if already voted
if(localStorage.getItem("voted")){ disableButtons(); }
</script>

</body>
</html>
