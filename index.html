<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal PM Voting</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    background: url("bg.jpg") no-repeat center center/cover;
    background-size: cover;
}

.container {
    background: rgba(255,255,255,0.95);
    width: 500px;
    margin: 50px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.candidate {
    margin: 25px 0;
}

.candidate img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 5px;
}

button {
    padding: 8px 18px;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 5px;
    background-color: #d31027;
}

button:hover {
    background-color: #a10c1f;
}

button:disabled {
    background-color: grey;
    cursor: not-allowed;
}

/* Vote box */
.vote-box {
    width: 100%;
    height: 30px;
    border-radius: 5px;
    margin-top: 5px;
    position: relative;
    overflow: hidden;
    display: none; /* hidden until vote */
}

.vote-fill {
    height: 100%;
    width: 0%;
    text-align: center;
    color: white;
    font-weight: bold;
    line-height: 30px;
    transition: width 0.7s;
}

/* Total votes */
#totalVotes {
    margin-top: 20px;
    font-weight: bold;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Vote for Next PM of Nepal</h1>

    <!-- Candidate 1: Balen Shah -->
    <div class="candidate">
        <img src="balen.jpg" alt="Balen Shah">
        <br>
        <button onclick="vote('balen')">Vote Balen Shah</button>
        <div class="vote-box">
            <div id="balenBar" class="vote-fill" style="background-color:blue;">0 (0%)</div>
        </div>
    </div>

    <!-- Candidate 2: Harka Sampang -->
    <div class="candidate">
        <img src="harka.jpg" alt="Harka Sampang">
        <br>
        <button onclick="vote('harka')">Vote Harka Sampang</button>
        <div class="vote-box">
            <div id="harkaBar" class="vote-fill" style="background-color:black;">0 (0%)</div>
        </div>
    </div>

    <!-- Candidate 3: KP Oli -->
    <div class="candidate">
        <img src="oli.jpg" alt="KP Oli">
        <br>
        <button onclick="vote('oli')">Vote KP Oli</button>
        <div class="vote-box">
            <div id="oliBar" class="vote-fill" style="background-color:red;">0 (0%)</div>
        </div>
    </div>

    <!-- Candidate 4: Gagan Thapa -->
    <div class="candidate">
        <img src="gagan.jpg" alt="Gagan Thapa">
        <br>
        <button onclick="vote('gagan')">Vote Gagan Thapa</button>
        <div class="vote-box">
            <div id="gaganBar" class="vote-fill" style="background-color:green;">0 (0%)</div>
        </div>
    </div>

    <!-- Total Votes -->
    <div id="totalVotes">Total Votes: 0</div>
</div>

<!-- Songs -->
<audio id="balenSong" src="balen.mp3"></audio>
<audio id="harkaSong" src="harka.mp3"></audio>
<audio id="oliSong" src="oli.mp3"></audio>
<audio id="gaganSong" src="gagan.mp3"></audio>

<script>
// Initialize votes
if (!localStorage.getItem("votes")) {
    const initialVotes = {balen:0, harka:0, oli:0, gagan:0};
    localStorage.setItem("votes", JSON.stringify(initialVotes));
}

// Show vote bars
function showBars() {
    const boxes = document.querySelectorAll('.vote-box');
    boxes.forEach(box => box.style.display = 'block');
}

// Update bars with vote count + percentage
function updateBars() {
    const votes = JSON.parse(localStorage.getItem("votes"));
    const total = votes.balen + votes.harka + votes.oli + votes.gagan;
    
    function updateBar(id, count) {
        const perc = total ? Math.round(count/total*100) : 0;
        const bar = document.getElementById(id);
        bar.style.width = perc + "%";
        bar.innerText = count + " (" + perc + "%)";
    }

    updateBar("balenBar", votes.balen);
    updateBar("harkaBar", votes.harka);
    updateBar("oliBar", votes.oli);
    updateBar("gaganBar", votes.gagan);

    document.getElementById("totalVotes").innerText = "Total Votes: " + total;
}

// Voting function
function vote(candidate) {
    if (localStorage.getItem("voted")) {
        alert("You have already voted!");
        showBars();
        updateBars();
        disableButtons();
        return;
    }

    let votes = JSON.parse(localStorage.getItem("votes"));
    votes[candidate]++;
    localStorage.setItem("votes", JSON.stringify(votes));
    localStorage.setItem("voted","true");

    alert("Thank you for voting");
    document.getElementById(candidate+"Song").play();

    showBars();
    updateBars();
    disableButtons();
}

// Disable buttons
function disableButtons() {
    const buttons = document.querySelectorAll("button");
    buttons.forEach(button => button.disabled = true);
}

// On page load
if (localStorage.getItem("voted")) {
    showBars();
    updateBars();
    disableButtons();
}
</script>

</body>
</html>
